<!--
  Authored canonical Number Field markup (no React). @21stgov/commons-js steps
  the value with the buttons or Arrow Up/Down, clamps to data-min/data-max by
  data-step, keeps aria-valuenow current, and disables a button at its bound.
-->
<div class="flex flex-col gap-5">
  <section aria-labelledby="nf-qty-h">
    <h3 id="nf-qty-h" class="text-sm font-semibold">Quantity (0–10, step 1)</h3>
    <div class="cui-number-field" data-slot="number-field" data-step="1" data-min="0" data-max="10" style="max-width:12rem">
      <label class="cui-number-field-label" data-slot="number-field-label" for="nf-qty"><span class="cui-number-field-label-text" data-slot="number-field-label-text">Quantity</span></label>
      <div class="cui-number-field-group" data-slot="number-field-group">
        <button type="button" class="cui-number-field-decrement" data-slot="number-field-decrement" aria-label="Decrease" aria-controls="nf-qty"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 8h9" stroke-linecap="round"></path></svg></button>
        <input class="cui-number-field-input" data-slot="number-field-input" id="nf-qty" role="spinbutton" aria-valuenow="2" aria-valuemin="0" aria-valuemax="10" inputmode="numeric" autocomplete="off" value="2" />
        <button type="button" class="cui-number-field-increment" data-slot="number-field-increment" aria-label="Increase" aria-controls="nf-qty"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3.5v9M3.5 8h9" stroke-linecap="round"></path></svg></button>
      </div>
    </div>
  </section>

  <section aria-labelledby="nf-temp-h">
    <h3 id="nf-temp-h" class="text-sm font-semibold">Thermostat (°F, step 0.5)</h3>
    <div class="cui-number-field" data-slot="number-field" data-step="0.5" data-min="50" data-max="90" style="max-width:12rem">
      <label class="cui-number-field-label" data-slot="number-field-label" for="nf-temp"><span class="cui-number-field-label-text" data-slot="number-field-label-text">Target temperature</span></label>
      <div class="cui-number-field-group" data-slot="number-field-group">
        <button type="button" class="cui-number-field-decrement" data-slot="number-field-decrement" aria-label="Decrease" aria-controls="nf-temp"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 8h9" stroke-linecap="round"></path></svg></button>
        <input class="cui-number-field-input" data-slot="number-field-input" id="nf-temp" role="spinbutton" aria-valuenow="68" aria-valuemin="50" aria-valuemax="90" inputmode="decimal" autocomplete="off" value="68" />
        <button type="button" class="cui-number-field-increment" data-slot="number-field-increment" aria-label="Increase" aria-controls="nf-temp"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3.5v9M3.5 8h9" stroke-linecap="round"></path></svg></button>
      </div>
    </div>
  </section>
</div>
