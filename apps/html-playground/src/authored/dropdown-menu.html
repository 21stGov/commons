<!--
  Authored canonical Dropdown Menu markup (no React). The menu lives in a
  fixed-position positioner that starts `hidden`; @21stgov/commons-js positions
  it under the trigger and handles open/close, outside/Escape dismiss, and
  arrow-key roving focus over the menu items.
-->
<div class="flex flex-col gap-5">
  <section aria-labelledby="dm-actions-h">
    <h3 id="dm-actions-h" class="text-sm font-semibold">Row actions menu</h3>
    <div data-slot="dropdown-menu">
      <button type="button" class="cui-button cui-button--outline cui-button--md" data-slot="dropdown-menu-trigger" aria-haspopup="menu" aria-expanded="false">Actions</button>
      <div class="cui-dropdown-menu-positioner" data-slot="dropdown-menu-positioner" hidden>
        <div class="cui-dropdown-menu-popup" data-slot="dropdown-menu-popup" role="menu" aria-label="Record actions" tabindex="-1">
          <div class="cui-dropdown-menu-label" data-slot="dropdown-menu-label">Manage record</div>
          <button type="button" class="cui-dropdown-menu-item cui-dropdown-menu-item--default" data-slot="dropdown-menu-item" role="menuitem"><svg aria-hidden="true" viewBox="0 0 16 16" class="size-4" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 3.5 12.5 5 5.5 12H4v-1.5L11 3.5Z" stroke-linejoin="round"></path></svg>Edit</button>
          <button type="button" class="cui-dropdown-menu-item cui-dropdown-menu-item--default" data-slot="dropdown-menu-item" role="menuitem"><svg aria-hidden="true" viewBox="0 0 16 16" class="size-4" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5.5" y="5.5" width="7" height="7" rx="1"></rect><path d="M3.5 10.5V4a.5.5 0 0 1 .5-.5h6" stroke-linecap="round"></path></svg>Duplicate</button>
          <div class="cui-dropdown-menu-separator" data-slot="dropdown-menu-separator" role="separator"></div>
          <button type="button" class="cui-dropdown-menu-item cui-dropdown-menu-item--destructive" data-slot="dropdown-menu-item" role="menuitem"><svg aria-hidden="true" viewBox="0 0 16 16" class="size-4" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 4.5h9M6.5 4.5V3.5a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1v1M5 4.5l.5 8h5l.5-8" stroke-linecap="round" stroke-linejoin="round"></path></svg>Delete</button>
        </div>
      </div>
    </div>
  </section>
</div>
