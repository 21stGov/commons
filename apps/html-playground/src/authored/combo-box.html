<!--
  Authored canonical Combo Box markup (no React) — a text input that filters a
  listbox. The input is the full-width bordered box (pe-12 leaves room for the
  affordances, which sit absolutely over its trailing edge). @21stgov/commons-js
  filters on input, opens/closes, drives aria-activedescendant, and picks an item.
-->
<div class="flex flex-col gap-5">
  <section aria-labelledby="cb-h">
    <h3 id="cb-h" class="text-sm font-semibold">Filter a long list (US states)</h3>
    <div class="cui-combo-box" data-slot="combo-box" style="position:relative;max-width:20rem">
      <input class="cui-combo-box-input" data-slot="combo-box-input" role="combobox" aria-expanded="false" aria-controls="cb-list" aria-autocomplete="list" aria-label="State" placeholder="Search states…" autocomplete="off" />
      <div class="cui-combo-box-affordances" data-slot="combo-box-affordances">
        <button type="button" class="cui-combo-box-clear" data-slot="combo-box-clear" aria-label="Clear" style="pointer-events:auto"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m4 4 8 8M12 4l-8 8" stroke-linecap="round"></path></svg></button>
        <button type="button" class="cui-combo-box-trigger" data-slot="combo-box-trigger" aria-label="Show states" tabindex="-1" style="pointer-events:auto"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m4 6 4 4 4-4" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      </div>
      <div class="cui-combo-box-positioner" data-slot="combo-box-positioner" hidden>
        <div class="cui-combo-box-popup" data-slot="combo-box-popup">
          <div id="cb-list" data-slot="combo-box-list" role="listbox" aria-label="States">
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-al" data-value="AL" data-label="Alabama" aria-selected="false"><span>Alabama</span><span class="cui-combo-box-item-indicator" data-slot="combo-box-item-indicator" hidden><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m3.5 8.5 3 3 6-7" stroke-linecap="round" stroke-linejoin="round"></path></svg></span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-ak" data-value="AK" data-label="Alaska" aria-selected="false"><span>Alaska</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-az" data-value="AZ" data-label="Arizona" aria-selected="false"><span>Arizona</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-ca" data-value="CA" data-label="California" aria-selected="false"><span>California</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-co" data-value="CO" data-label="Colorado" aria-selected="false"><span>Colorado</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-fl" data-value="FL" data-label="Florida" aria-selected="false"><span>Florida</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-ga" data-value="GA" data-label="Georgia" aria-selected="false"><span>Georgia</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-il" data-value="IL" data-label="Illinois" aria-selected="false"><span>Illinois</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-ny" data-value="NY" data-label="New York" aria-selected="false"><span>New York</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-tx" data-value="TX" data-label="Texas" aria-selected="false"><span>Texas</span></div>
            <div class="cui-combo-box-item" data-slot="combo-box-item" role="option" id="cb-wa" data-value="WA" data-label="Washington" aria-selected="false"><span>Washington</span></div>
          </div>
          <div class="cui-combo-box-empty" data-slot="combo-box-empty" hidden>No states found.</div>
        </div>
      </div>
    </div>
  </section>
</div>
