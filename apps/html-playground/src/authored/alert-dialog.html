<!--
  Authored canonical Alert Dialog markup (no React). Like Dialog, but role
  "alertdialog" and it does NOT dismiss on an outside press (a deliberate,
  destructive choice must be confirmed or cancelled). @21stgov/commons-js.
-->
<div class="flex flex-col gap-2">
  <div data-slot="alert-dialog" data-dialog-role="alertdialog">
    <button type="button" class="cui-button cui-button--primary cui-button--md" data-slot="alert-dialog-trigger" aria-haspopup="dialog" aria-expanded="false">Revoke access</button>
    <div class="cui-alert-dialog-backdrop" data-slot="alert-dialog-backdrop" hidden></div>
    <div class="cui-alert-dialog-viewport" data-slot="alert-dialog-viewport" hidden>
      <div class="cui-alert-dialog-content cui-alert-dialog-content--sm" role="alertdialog" aria-modal="true" aria-labelledby="ad-title" aria-describedby="ad-desc" data-slot="alert-dialog-content" tabindex="-1">
        <h2 class="cui-alert-dialog-title" data-slot="alert-dialog-title" id="ad-title">Revoke this user’s access?</h2>
        <p class="cui-alert-dialog-description" data-slot="alert-dialog-description" id="ad-desc">They are signed out immediately and lose access to all department records.</p>
        <div class="cui-alert-dialog-footer" data-slot="alert-dialog-footer">
          <button type="button" class="cui-button cui-button--outline cui-button--md" data-dialog-close>Cancel</button>
          <button type="button" class="cui-button cui-button--danger cui-button--md" data-dialog-close>Revoke access</button>
        </div>
      </div>
    </div>
  </div>
  <p class="text-sm text-muted-foreground">Escape or Cancel closes it; an outside click does not.</p>
</div>
