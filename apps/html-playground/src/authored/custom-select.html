<!--
  Authored canonical Custom Select markup (no React) — a listbox opened from a
  button. @21stgov/commons-js handles open/close, keyboard (arrows, type-ahead,
  Enter/Escape), selection (updates the trigger value + the check indicator).
-->
<div class="flex flex-col gap-5">
  <section aria-labelledby="cs-priority-h">
    <h3 id="cs-priority-h" class="text-sm font-semibold">Priority (with a disabled option)</h3>
    <div data-slot="custom-select" style="max-width:16rem">
      <button type="button" class="cui-custom-select-trigger" data-slot="custom-select-trigger" aria-haspopup="listbox" aria-expanded="false" aria-label="Priority" data-value="normal">
        <span class="cui-custom-select-value" data-slot="custom-select-value">Normal</span>
        <span class="cui-custom-select-icon" data-slot="custom-select-icon"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m4 6 4 4 4-4" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
      </button>
      <div class="cui-custom-select-positioner" data-slot="custom-select-positioner" hidden>
        <div class="cui-custom-select-popup" data-slot="custom-select-popup">
          <div data-slot="custom-select-list" role="listbox" aria-label="Priority" tabindex="-1">
            <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="low" aria-selected="false"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator" hidden><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m3.5 8.5 3 3 6-7" stroke-linecap="round" stroke-linejoin="round"></path></svg></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">Low</span></div>
            <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="normal" aria-selected="true"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m3.5 8.5 3 3 6-7" stroke-linecap="round" stroke-linejoin="round"></path></svg></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">Normal</span></div>
            <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="high" aria-selected="false"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator" hidden><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m3.5 8.5 3 3 6-7" stroke-linecap="round" stroke-linejoin="round"></path></svg></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">High</span></div>
            <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="urgent" aria-selected="false" data-disabled aria-disabled="true"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator" hidden></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">Urgent (on hold)</span></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section aria-labelledby="cs-dept-h">
    <h3 id="cs-dept-h" class="text-sm font-semibold">Grouped options (departments)</h3>
    <div data-slot="custom-select" style="max-width:16rem">
      <button type="button" class="cui-custom-select-trigger" data-slot="custom-select-trigger" aria-haspopup="listbox" aria-expanded="false" aria-label="Department" data-value="">
        <span class="cui-custom-select-value" data-slot="custom-select-value">Choose a department</span>
        <span class="cui-custom-select-icon" data-slot="custom-select-icon"><svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m4 6 4 4 4-4" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
      </button>
      <div class="cui-custom-select-positioner" data-slot="custom-select-positioner" hidden>
        <div class="cui-custom-select-popup" data-slot="custom-select-popup">
          <div data-slot="custom-select-list" role="listbox" aria-label="Department" tabindex="-1">
            <div data-slot="custom-select-group" role="group" aria-labelledby="cs-grp-pw">
              <div class="cui-custom-select-group-label" data-slot="custom-select-group-label" id="cs-grp-pw">Public works</div>
              <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="streets" aria-selected="false"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator" hidden></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">Streets &amp; paving</span></div>
              <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="water" aria-selected="false"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator" hidden></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">Water &amp; sewer</span></div>
            </div>
            <div data-slot="custom-select-group" role="group" aria-labelledby="cs-grp-cm">
              <div class="cui-custom-select-group-label" data-slot="custom-select-group-label" id="cs-grp-cm">Community</div>
              <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="parks" aria-selected="false"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator" hidden></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">Parks &amp; recreation</span></div>
              <div class="cui-custom-select-item" data-slot="custom-select-item" role="option" data-value="library" aria-selected="false"><span class="cui-custom-select-item-indicator" data-slot="custom-select-item-indicator" hidden></span><span class="cui-custom-select-item-text" data-slot="custom-select-item-text">Library</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
