<!--
  Authored canonical Input Mask markup (no React). @21stgov/commons-js formats
  the value against data-mask as you type — `#` takes a digit, other characters
  are inserted automatically.
-->
<div class="flex flex-col gap-5">
  <section aria-labelledby="im-h">
    <h3 id="im-h" class="text-sm font-semibold">Fixed-format fields</h3>
    <div class="flex flex-col gap-3" style="max-width:20rem">
      <label class="flex flex-col gap-1 text-sm font-medium">Phone
        <input class="cui-input" data-slot="input-mask" data-mask="(###) ###-####" type="tel" inputmode="numeric" autocomplete="tel" placeholder="(555) 123-4567" />
      </label>
      <label class="flex flex-col gap-1 text-sm font-medium">Social Security number
        <span class="cui-input-mask-secure" data-slot="input-mask-secure" style="display:block">
          <input class="cui-input" data-slot="input-mask" data-mask="###-##-####" type="password" inputmode="numeric" autocomplete="off" placeholder="123-45-6789" style="padding-inline-end:3rem;font-family:var(--cui-font-family-mono);font-variant-numeric:tabular-nums;letter-spacing:0.02em" />
          <button type="button" class="cui-input-mask-reveal" data-slot="input-mask-reveal" aria-pressed="false" aria-label="Show" data-show-label="Show" data-hide-label="Hide">
            <svg data-im-eye aria-hidden="true" viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6-8.5-6-8.5-6Z"></path><circle cx="10" cy="10" r="2.5"></circle></svg>
            <svg data-im-eye-off hidden aria-hidden="true" viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 10s3-6 7.5-6c1.6 0 3 .5 4.2 1.2M17.5 10s-3 6-7.5 6c-1.6 0-3-.5-4.2-1.2"></path><path d="M8.2 8.2a2.5 2.5 0 0 0 3.6 3.6"></path><path d="m3 3 14 14"></path></svg>
          </button>
        </span>
      </label>
      <label class="flex flex-col gap-1 text-sm font-medium">ZIP+4
        <input class="cui-input" data-slot="input-mask" data-mask="#####-####" inputmode="numeric" autocomplete="postal-code" placeholder="97201-1234" />
      </label>
    </div>
  </section>
</div>
