<!--
  Authored canonical Carousel markup (no React). Each item is a full viewport;
  @21stgov/commons-js translates the flex track on Prev/Next, updates the "N of
  M" status, disables the controls at the ends, and aria-hides off-screen slides.
-->
<div class="flex flex-col gap-5">
  <section aria-labelledby="carousel-h">
    <h3 id="carousel-h" class="text-sm font-semibold">Featured city services</h3>
    <div class="cui-carousel" data-slot="carousel" role="region" aria-roledescription="carousel" aria-label="Featured city services" style="max-width:28rem">
      <div class="cui-carousel-viewport border border-border bg-background" data-slot="carousel-viewport">
        <div class="cui-carousel-content" data-slot="carousel-content" style="transition:transform 0.3s ease">
          <div class="cui-carousel-item" data-slot="carousel-item" role="group" aria-roledescription="slide" aria-label="1 of 3">
            <div class="grid min-h-40 content-between gap-3 bg-muted p-4"><span class="text-sm text-muted-foreground">Service 1</span><h3 class="text-lg font-semibold">Building permits</h3></div>
          </div>
          <div class="cui-carousel-item" data-slot="carousel-item" role="group" aria-roledescription="slide" aria-label="2 of 3">
            <div class="grid min-h-40 content-between gap-3 bg-muted p-4"><span class="text-sm text-muted-foreground">Service 2</span><h3 class="text-lg font-semibold">Trash and recycling</h3></div>
          </div>
          <div class="cui-carousel-item" data-slot="carousel-item" role="group" aria-roledescription="slide" aria-label="3 of 3">
            <div class="grid min-h-40 content-between gap-3 bg-muted p-4"><span class="text-sm text-muted-foreground">Service 3</span><h3 class="text-lg font-semibold">Public meetings</h3></div>
          </div>
        </div>
      </div>
      <div class="cui-carousel-controls" data-slot="carousel-controls">
        <button type="button" class="cui-carousel-previous" data-slot="carousel-previous" aria-label="Previous slide"><svg aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m10 3.5-4.5 4.5 4.5 4.5" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
        <span class="cui-carousel-status" data-slot="carousel-status" aria-live="polite">1 of 3</span>
        <button type="button" class="cui-carousel-next" data-slot="carousel-next" aria-label="Next slide"><svg aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m6 3.5 4.5 4.5L6 12.5" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      </div>
    </div>
  </section>
</div>
