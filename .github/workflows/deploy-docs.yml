# SPDX-License-Identifier: MIT
name: Deploy Docs

# Builds the documentation site (Next static export → apps/docs/out, including
# the CLI registry at /r and JSON schemas at /schema) and deploys it to
# Cloudflare Workers Static Assets as the `commons-docs` Worker.
#
# Requires one repository secret: CLOUDFLARE_API_TOKEN — a Cloudflare API token
# scoped to the 21st Gov account with "Edit Cloudflare Workers" permission. The
# account_id is public and lives in apps/docs/wrangler.jsonc.

on:
  push:
    branches: [main]
    # Only redeploy when something that affects the built site changes.
    paths:
      - "apps/docs/**"
      - "apps/registry/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# One docs deploy at a time; cancel the in-flight run when a newer push lands.
concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Exposed at job level so the deploy step's `if:` can gate on it (secrets
      # can't be referenced in `if:` directly). Until the token exists the build
      # still runs (a smoke test) and the deploy is skipped, keeping this green.
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (all packages + docs static export)
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/docs
          command: deploy
