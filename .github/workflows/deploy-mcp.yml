# SPDX-License-Identifier: MIT
name: Deploy MCP

# Builds the monorepo (the hosted MCP Worker imports @21stgov/commons/registry,
# so the CLI must be built first) and deploys apps/mcp-server to Cloudflare as
# the `commons-mcp` Worker (mcp.commonsui.com).
#
# Requires the CLOUDFLARE_API_TOKEN repository secret (21st Gov account, "Edit
# Cloudflare Workers" + Zone DNS/Routes for the custom domain).

on:
  push:
    branches: [main]
    paths:
      - "apps/mcp-server/**"
      - "packages/cli/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-mcp.yml"
  workflow_dispatch:

concurrency:
  group: deploy-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (registry lib + worker bundle check)
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CF_TOKEN != '' }}
        working-directory: apps/mcp-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # Run wrangler directly (not cloudflare/wrangler-action) — the action
        # installs its pinned wrangler with npm, which fails in this pnpm
        # workspace on the `workspace:*` protocol. account_id is in wrangler.jsonc.
        run: pnpm dlx wrangler@4.110.0 deploy
