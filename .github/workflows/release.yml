# SPDX-License-Identifier: MIT
name: Release

# Runs on every push to main. When unreleased changesets are present it opens
# (or updates) a "Version Packages" PR that applies them — bumping versions and
# writing CHANGELOGs. When that PR is merged and no changesets remain, this same
# job publishes the changed packages to the PUBLIC npm registry (npmjs.com).
#
# Auth is npm Trusted Publishing (OIDC) — there is NO stored npm token. GitHub
# mints a short-lived OIDC token (via the `id-token: write` permission), pnpm
# exchanges it with npm, and npm verifies it against the trusted publisher we
# configured for the @21stgov scope (repo 21stGov/commons, workflow release.yml).
# Provenance attestation is generated automatically from that same OIDC token.
#
# Requirements (all satisfied here):
#   - Node > 22 (OIDC support) — we use 24.
#   - pnpm >= 10.16 with working OIDC (pinned via packageManager; 11.x has a
#     known regression, so we stay on 10.x).
#   - A trusted publisher registered on npmjs.com for this repo + workflow.
# GITHUB_TOKEN is provided by Actions automatically.

on:
  push:
    branches: [main]
  # Manual trigger — lets a stuck publish be finished from the Actions tab
  # (e.g. after a Release run is cancelled mid-flight, leaving versions bumped
  # on main but not yet published to npm).
  workflow_dispatch:

# Never let two releases run at once.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Version Packages PR + tags
      pull-requests: write # open/update that PR
      id-token: write # OIDC: npm trusted publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        # Version comes from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          # Point npm/pnpm at the PUBLIC registry. No token line needed — OIDC
          # supplies credentials at publish time.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # Publish needs the built dist/ for every package.
        run: pnpm build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When changesets exist → open/update the "Version Packages" PR.
          version: pnpm changeset version
          # When none remain (version PR merged) → publish to npm via OIDC.
          publish: pnpm changeset publish
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # After a real publish, ship the versioned first-party CDN assets to R2
      # (cdn.commonsui.com). Paths are immutable — a given v<version>/ is only
      # written once, so re-runs are idempotent. Needs CLOUDFLARE_API_TOKEN with
      # the "Workers R2 Storage" scope; the account id is public.
      - name: Publish CDN assets to R2
        if: steps.changesets.outputs.published == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cf4b4714e2d4e9e84c788b01da4cb25b
        run: |
          set -euo pipefail
          pnpm build:cdn
          VERSION="v$(node -p "require('./packages/css/package.json').version")"
          put() {
            pnpm dlx wrangler@4.110.0 r2 object put "commons-cdn/$VERSION/$1" \
              --file "dist-cdn/$VERSION/$1" \
              --content-type "$2" \
              --cache-control "public, max-age=31536000, immutable" \
              --remote
          }
          put commons.css     "text/css; charset=utf-8"
          put commons.min.css "text/css; charset=utf-8"
          put fonts.css       "text/css; charset=utf-8"
          put commons.js      "text/javascript; charset=utf-8"
          put commons.min.js  "text/javascript; charset=utf-8"
          echo "Uploaded commons-cdn/$VERSION/ → cdn.commonsui.com/$VERSION/"
